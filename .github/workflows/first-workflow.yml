name: Conditional Execution demo

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Always run
        run: echo "This runs on all branches"

      - name: Run only on main
        if: github.ref == 'refs/heads/main'
        run: echo "Building application for production"

      - name: Run only on dev
        if: github.ref == 'refs/heads/dev'
        run: echo "Building application for development"